# NorthMesh - Mosquitto configuration
# WebSockets only — all traffic routes through Cloudflare Tunnel

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type all
log_type websockets
connection_messages true
log_timestamp true

# WebSocket listener only (no plain TCP MQTT)
listener 9001
protocol websockets

allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# Connection limits
max_connections 500
max_keepalive 300
