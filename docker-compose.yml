services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_WS_URL=wss://${HOST:-northmesh.co.uk}/ws
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - northmesh

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=3001
      - MQTT_BROKER=${MQTT_BROKER:-mqtt.meshcore.uk}
      - MQTT_PORT=${MQTT_PORT:-8883}
      - MQTT_TLS=${MQTT_TLS:-true}
    restart: unless-stopped
    networks:
      - northmesh

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - northmesh

  cloudflared:
    image: cloudflare/cloudflared:latest
    volumes:
      - ./cloudflared.yml:/etc/cloudflared/config.yml:ro
    command: tunnel --no-autoupdate run --config /etc/cloudflared/config.yml
    restart: unless-stopped
    networks:
      - northmesh
    depends_on:
      - nginx
      - backend

networks:
  northmesh:
    driver: bridge
