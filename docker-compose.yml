services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_WS_URL=wss://${HOST:-northmesh.co.uk}/ws
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - northmesh

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=${PORT:-3001}
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-wss://mqtt.meshcore.uk:9001}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://northmesh.co.uk,https://www.northmesh.co.uk}
    restart: unless-stopped
    networks:
      - northmesh

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - northmesh

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - northmesh
    depends_on:
      - nginx
      - backend

networks:
  northmesh:
    driver: bridge
